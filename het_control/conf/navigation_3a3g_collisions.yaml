defaults:
  - experiment: het_control_experiment
  - algorithm: ippo
  - task: vmas/navigation_bounded
  - model: hetcontrolmlpempirical
  - model@critic_model: layers/mlp
  - _self_

seed: 0

use_action_loss: True
action_loss_lr: 0.00003

algorithm:
  minibatch_advantage: False

model:
  desired_snd: 0.0

experiment:
  save_folder: null
  checkpoint_interval: 600_000
  render: True

hydra:
  searchpath:
    - pkg://benchmarl/conf
